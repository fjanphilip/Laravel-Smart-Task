version: "3.8"

services:
  smart_task_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_task_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8009:8000" # Port 8009 agar tidak bentrok dengan CostumeRent (8008)
    networks:
      - costume_shared_net

networks:
  costume_shared_net:
    external: true
    name: shared-network # Menghubungkan ke network existing di VPS
